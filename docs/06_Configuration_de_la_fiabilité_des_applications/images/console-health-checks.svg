<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <rect width="1000" height="640" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="0" width="1000" height="36" fill="#2d2d44" rx="8"/>
  <rect x="0" y="20" width="1000" height="16" fill="#2d2d44"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="100" y="8" width="700" height="20" rx="10" fill="#1a1a2e"/>
  <text x="450" y="22" text-anchor="middle" font-size="11" fill="#aaa">https://console-openshift-console.apps/.../deployments/probes-app/containers/probes-app/health-checks</text>

  <rect x="0" y="36" width="1000" height="604" fill="#0f0f0f"/>

  <!-- Top nav -->
  <rect x="0" y="36" width="1000" height="48" fill="#1b1d21"/>
  <rect x="12" y="48" width="28" height="22" rx="2" fill="#ff0454"/>
  <text x="16" y="63" font-size="12" font-weight="bold" fill="white">RH</text>
  <text x="48" y="63" font-size="14" font-weight="bold" fill="white">OpenShift</text>
  <text x="150" y="65" font-size="12" fill="#8a8d90">Administrator  |  Project: prague-user-ns</text>

  <!-- Left sidebar -->
  <rect x="0" y="84" width="220" height="556" fill="#1b1d21"/>
  <text x="20" y="120" font-size="12" fill="#8a8d90">Home</text>
  <rect x="0" y="130" width="220" height="24" fill="#202cac"/>
  <text x="20" y="147" font-size="12" font-weight="bold" fill="white">Workloads</text>
  <text x="36" y="175" font-size="11" fill="#8a8d90">Pods</text>
  <text x="36" y="197" font-size="11" fill="white">Deployments</text>
  <text x="36" y="219" font-size="11" fill="#8a8d90">ReplicaSets</text>

  <!-- Main area -->
  <rect x="220" y="84" width="780" height="556" fill="#0f0f0f"/>

  <!-- Page title -->
  <text x="235" y="108" font-size="12" fill="#8a8d90">Workloads > Deployments > probes-app > Health Checks</text>
  <text x="235" y="138" font-size="22" font-weight="bold" fill="white">Add Health Checks</text>
  <text x="235" y="158" font-size="12" fill="#8a8d90">Container: probes-app</text>

  <!-- Liveness Probe section -->
  <rect x="235" y="175" width="740" height="195" rx="6" fill="#1b1d21" stroke="#2c2f33" stroke-width="1"/>

  <!-- Toggle header -->
  <rect x="250" y="190" width="30" height="18" rx="9" fill="#202cac"/>
  <circle cx="271" cy="199" r="8" fill="white"/>
  <text x="290" y="203" font-size="14" font-weight="bold" fill="white">Liveness Probe</text>
  <text x="290" y="220" font-size="11" fill="#8a8d90">Vérifie si le pod est vivant. Si échec : redémarrage du conteneur.</text>

  <!-- Form fields -->
  <text x="255" y="248" font-size="11" fill="#8a8d90">Type</text>
  <rect x="255" y="254" width="160" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="275" y="272" font-size="12" fill="white">HTTP GET  v</text>

  <text x="435" y="248" font-size="11" fill="#8a8d90">Path</text>
  <rect x="435" y="254" width="180" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="450" y="272" font-size="12" fill="white">/healthz</text>

  <text x="635" y="248" font-size="11" fill="#8a8d90">Port</text>
  <rect x="635" y="254" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="650" y="272" font-size="12" fill="white">8080</text>

  <text x="255" y="304" font-size="11" fill="#8a8d90">Initial Delay</text>
  <rect x="255" y="310" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="270" y="328" font-size="12" fill="white">10 s</text>

  <text x="375" y="304" font-size="11" fill="#8a8d90">Period</text>
  <rect x="375" y="310" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="390" y="328" font-size="12" fill="white">5 s</text>

  <text x="495" y="304" font-size="11" fill="#8a8d90">Failure Threshold</text>
  <rect x="495" y="310" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="510" y="328" font-size="12" fill="white">3</text>

  <text x="615" y="304" font-size="11" fill="#8a8d90">Success Threshold</text>
  <rect x="615" y="310" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="630" y="328" font-size="12" fill="white">1</text>

  <text x="255" y="358" font-size="11" fill="#8a8d90">Timeout</text>
  <rect x="255" y="364" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="270" y="382" font-size="12" fill="white">1 s</text>

  <!-- Readiness Probe section -->
  <rect x="235" y="385" width="740" height="185" rx="6" fill="#1b1d21" stroke="#2c2f33" stroke-width="1"/>

  <rect x="250" y="400" width="30" height="18" rx="9" fill="#202cac"/>
  <circle cx="271" cy="409" r="8" fill="white"/>
  <text x="290" y="413" font-size="14" font-weight="bold" fill="white">Readiness Probe</text>
  <text x="290" y="430" font-size="11" fill="#8a8d90">Vérifie si le pod est prêt. Si échec : retiré du Service (pas redémarré).</text>

  <text x="255" y="458" font-size="11" fill="#8a8d90">Type</text>
  <rect x="255" y="464" width="160" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="275" y="482" font-size="12" fill="white">HTTP GET  v</text>

  <text x="435" y="458" font-size="11" fill="#8a8d90">Path</text>
  <rect x="435" y="464" width="180" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="450" y="482" font-size="12" fill="white">/readyz</text>

  <text x="635" y="458" font-size="11" fill="#8a8d90">Port</text>
  <rect x="635" y="464" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="650" y="482" font-size="12" fill="white">8080</text>

  <text x="255" y="514" font-size="11" fill="#8a8d90">Initial Delay</text>
  <rect x="255" y="520" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="270" y="538" font-size="12" fill="white">5 s</text>

  <text x="375" y="514" font-size="11" fill="#8a8d90">Period</text>
  <rect x="375" y="520" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="390" y="538" font-size="12" fill="white">5 s</text>

  <text x="495" y="514" font-size="11" fill="#8a8d90">Failure Threshold</text>
  <rect x="495" y="520" width="100" height="28" rx="4" fill="#2c2f33" stroke="#5a5d62" stroke-width="1"/>
  <text x="510" y="538" font-size="12" fill="white">3</text>

  <!-- Save button -->
  <rect x="235" y="585" width="120" height="36" rx="4" fill="#202cac"/>
  <text x="295" y="607" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Save</text>
  <rect x="368" y="585" width="100" height="36" rx="4" fill="transparent" stroke="#5a5d62" stroke-width="1"/>
  <text x="418" y="607" text-anchor="middle" font-size="13" fill="white">Cancel</text>
</svg>
