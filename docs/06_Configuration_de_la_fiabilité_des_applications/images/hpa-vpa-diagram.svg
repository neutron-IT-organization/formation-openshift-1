<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#202cac"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff0454"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="400" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">Autoscaling : HPA vs VPA</text>

  <!-- HPA Panel -->
  <rect x="20" y="45" width="385" height="290" rx="8" fill="white" stroke="#202cac" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="45" width="385" height="38" rx="8" fill="#202cac"/>
  <rect x="20" y="72" width="385" height="11" fill="#202cac"/>
  <text x="212" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">HPA — Horizontal Pod Autoscaler</text>

  <!-- HPA diagram -->
  <!-- Metrics source -->
  <rect x="35" y="96" width="150" height="36" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="110" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Métriques</text>
  <text x="110" y="127" text-anchor="middle" font-size="10" fill="#555">CPU / Memory / Custom</text>

  <!-- Arrow to HPA -->
  <line x1="185" y1="114" x2="218" y2="114" stroke="#202cac" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HPA controller -->
  <rect x="218" y="96" width="160" height="36" rx="4" fill="#202cac"/>
  <text x="298" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">HPA Controller</text>

  <!-- Arrow down: scale replicas -->
  <line x1="298" y1="132" x2="298" y2="160" stroke="#202cac" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="315" y="150" font-size="10" fill="#202cac">scale</text>

  <!-- Deployment box -->
  <rect x="130" y="160" width="230" height="44" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1.5"/>
  <text x="245" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">Deployment</text>
  <text x="245" y="194" text-anchor="middle" font-size="10" fill="#555">replicas: 2 → 5 → 8</text>

  <!-- Pods row -->
  <text x="212" y="222" text-anchor="middle" font-size="10" fill="#555">Nouveaux pods créés:</text>
  <rect x="35" y="228" width="52" height="38" rx="4" fill="#ff0454"/>
  <text x="61" y="251" text-anchor="middle" font-size="9" fill="white">Pod 1</text>
  <rect x="94" y="228" width="52" height="38" rx="4" fill="#ff0454"/>
  <text x="120" y="251" text-anchor="middle" font-size="9" fill="white">Pod 2</text>
  <rect x="153" y="228" width="52" height="38" rx="4" fill="#202cac"/>
  <text x="179" y="251" text-anchor="middle" font-size="9" fill="white">Pod 3</text>
  <rect x="212" y="228" width="52" height="38" rx="4" fill="#202cac"/>
  <text x="238" y="251" text-anchor="middle" font-size="9" fill="white">Pod 4</text>
  <rect x="271" y="228" width="52" height="38" rx="4" fill="#202cac"/>
  <text x="297" y="251" text-anchor="middle" font-size="9" fill="white">Pod 5</text>
  <rect x="330" y="228" width="52" height="38" rx="4" fill="#202cac" opacity="0.5" stroke="#202cac" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="356" y="251" text-anchor="middle" font-size="9" fill="white">+N</text>

  <text x="95" y="280" font-size="9" fill="#ff0454">● Existants</text>
  <text x="210" y="280" font-size="9" fill="#202cac">● Ajoutés</text>

  <!-- HPA summary -->
  <rect x="35" y="290" width="355" height="34" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="212" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">Ajoute des réplicas (copies) du pod</text>
  <text x="212" y="318" text-anchor="middle" font-size="10" fill="#555">Scalabilité horizontale — idéal pour les apps stateless</text>

  <!-- VPA Panel -->
  <rect x="415" y="45" width="385" height="290" rx="8" fill="white" stroke="#ff0454" stroke-width="2" filter="url(#shadow)"/>
  <rect x="415" y="45" width="385" height="38" rx="8" fill="#ff0454"/>
  <rect x="415" y="72" width="385" height="11" fill="#ff0454"/>
  <text x="607" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">VPA — Vertical Pod Autoscaler</text>

  <!-- VPA diagram -->
  <rect x="430" y="96" width="150" height="36" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="505" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff0454">Métriques</text>
  <text x="505" y="127" text-anchor="middle" font-size="10" fill="#555">CPU / Memory usage</text>

  <line x1="580" y1="114" x2="613" y2="114" stroke="#ff0454" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="613" y="96" width="160" height="36" rx="4" fill="#ff0454"/>
  <text x="693" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">VPA Controller</text>

  <line x1="693" y1="132" x2="693" y2="160" stroke="#ff0454" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="710" y="150" font-size="10" fill="#ff0454">resize</text>

  <!-- Pod before/after -->
  <rect x="430" y="160" width="170" height="110" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1.5"/>
  <text x="515" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff0454">Avant</text>
  <rect x="445" y="188" width="140" height="28" rx="3" fill="#ff0454" opacity="0.6"/>
  <text x="515" y="205" text-anchor="middle" font-size="10" fill="white">Pod : 100m CPU / 128Mi</text>
  <text x="515" y="230" text-anchor="middle" font-size="10" fill="#666">1 réplica</text>
  <text x="515" y="260" text-anchor="middle" font-size="9" fill="#888">Ressources sous-dimensionnées</text>

  <text x="620" y="218" text-anchor="middle" font-size="22" fill="#ff0454">→</text>

  <rect x="635" y="160" width="150" height="110" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1.5"/>
  <text x="710" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff0454">Après</text>
  <rect x="645" y="188" width="130" height="28" rx="3" fill="#ff0454"/>
  <text x="710" y="205" text-anchor="middle" font-size="10" fill="white">Pod : 500m CPU / 512Mi</text>
  <text x="710" y="230" text-anchor="middle" font-size="10" fill="#666">1 réplica (inchangé)</text>
  <text x="710" y="260" text-anchor="middle" font-size="9" fill="#888">Ressources augmentées</text>

  <!-- VPA summary -->
  <rect x="430" y="290" width="355" height="34" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="607" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff0454">Augmente les ressources CPU/RAM du pod</text>
  <text x="607" y="318" text-anchor="middle" font-size="10" fill="#555">Scalabilité verticale — nécessite un redémarrage du pod</text>

  <!-- Bottom comparison -->
  <rect x="20" y="348" width="780" height="42" rx="6" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="410" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">Combinaison HPA + VPA possible avec des métriques différentes</text>
  <text x="410" y="382" text-anchor="middle" font-size="11" fill="#555">HPA sur CPU personnalisé (ex: req/s) + VPA sur CPU/mémoire système — éviter la même métrique pour les deux</text>
</svg>
