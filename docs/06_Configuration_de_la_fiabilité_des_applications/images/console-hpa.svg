<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <!-- Background -->
  <rect width="1000" height="500" fill="#0f1117"/>

  <!-- Top navigation bar -->
  <rect width="1000" height="48" fill="#1a1d2e"/>
  <rect width="1000" height="2" y="48" fill="#ff0454"/>

  <!-- Red Hat OpenShift logo area -->
  <rect x="12" y="10" width="28" height="28" rx="4" fill="#ff0454"/>
  <text x="26" y="28" font-family="monospace" font-size="14" font-weight="bold" fill="white" text-anchor="middle">RH</text>
  <text x="50" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Red Hat</text>
  <text x="50" y="37" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">OpenShift Container Platform</text>

  <!-- Top nav items -->
  <text x="680" y="30" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Administrator</text>
  <circle cx="820" cy="24" r="10" fill="#202cac"/>
  <text x="820" y="28" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">kube</text>
  <text x="845" y="28" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">kubeadmin</text>
  <text x="940" y="28" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">? Help</text>

  <!-- Left sidebar -->
  <rect x="0" y="50" width="220" height="450" fill="#151722"/>

  <!-- Sidebar nav groups -->
  <!-- Home -->
  <text x="16" y="82" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">HOME</text>
  <text x="16" y="102" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Overview</text>
  <text x="16" y="120" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Projects</text>

  <!-- Workloads section -->
  <text x="16" y="148" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">WORKLOADS</text>
  <text x="16" y="168" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Pods</text>
  <text x="16" y="186" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Deployments</text>
  <text x="16" y="204" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">DeploymentConfigs</text>
  <text x="16" y="222" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">StatefulSets</text>
  <text x="16" y="240" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">DaemonSets</text>
  <text x="16" y="258" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Jobs</text>
  <text x="16" y="276" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">CronJobs</text>

  <!-- HPA highlighted item -->
  <rect x="0" y="284" width="220" height="22" fill="#202cac" rx="0"/>
  <rect x="0" y="284" width="3" height="22" fill="#ff0454"/>
  <text x="16" y="299" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">HorizontalPodAutoscalers</text>

  <!-- Networking section -->
  <text x="16" y="330" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">NETWORKING</text>
  <text x="16" y="350" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Services</text>
  <text x="16" y="368" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Routes</text>
  <text x="16" y="386" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Ingresses</text>

  <!-- Main content area -->
  <rect x="220" y="50" width="780" height="450" fill="#0f1117"/>

  <!-- Breadcrumb -->
  <text x="240" y="75" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">Workloads</text>
  <text x="318" y="75" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4"> &gt; </text>
  <text x="334" y="75" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4">HorizontalPodAutoscalers</text>
  <text x="504" y="75" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4"> &gt; </text>
  <text x="520" y="75" font-family="Arial, sans-serif" font-size="12" fill="white">welcome-app-hpa</text>

  <!-- Page title -->
  <text x="240" y="108" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">welcome-app-hpa</text>

  <!-- Namespace badge -->
  <rect x="240" y="116" width="160" height="18" rx="9" fill="#1a1d2e" stroke="#202cac" stroke-width="1"/>
  <text x="320" y="129" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4" text-anchor="middle">Namespace: production</text>

  <!-- Status badge -->
  <rect x="412" y="116" width="80" height="18" rx="9" fill="#0d2e1a" stroke="#2d7d46" stroke-width="1"/>
  <circle cx="425" cy="125" r="4" fill="#3db868"/>
  <text x="437" y="129" font-family="Arial, sans-serif" font-size="11" fill="#3db868">Active</text>

  <!-- Action buttons -->
  <rect x="750" y="98" width="80" height="26" rx="4" fill="transparent" stroke="#aab0c4" stroke-width="1"/>
  <text x="790" y="115" font-family="Arial, sans-serif" font-size="12" fill="#aab0c4" text-anchor="middle">Actions</text>

  <!-- Tabs -->
  <line x1="240" y1="158" x2="980" y2="158" stroke="#2a2d3e" stroke-width="1"/>
  <rect x="240" y="144" width="72" height="14" rx="0" fill="transparent"/>
  <text x="276" y="156" font-family="Arial, sans-serif" font-size="13" fill="#ff0454" text-anchor="middle">Details</text>
  <rect x="240" y="156" width="72" height="2" fill="#ff0454"/>
  <text x="360" y="156" font-family="Arial, sans-serif" font-size="13" fill="#aab0c4" text-anchor="middle">YAML</text>
  <text x="444" y="156" font-family="Arial, sans-serif" font-size="13" fill="#aab0c4" text-anchor="middle">Events</text>

  <!-- Detail cards row 1 -->
  <!-- Card: Replicas -->
  <rect x="240" y="172" width="360" height="130" rx="6" fill="#151722" stroke="#2a2d3e" stroke-width="1"/>
  <text x="256" y="196" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Replicas</text>
  <line x1="240" y1="202" x2="600" y2="202" stroke="#2a2d3e" stroke-width="1"/>

  <text x="256" y="222" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Min Pods</text>
  <text x="400" y="222" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">2</text>

  <text x="256" y="244" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Max Pods</text>
  <text x="400" y="244" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">10</text>

  <text x="256" y="266" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Current Replicas</text>
  <text x="400" y="266" font-family="Arial, sans-serif" font-size="12" fill="#3db868" font-weight="bold">3</text>

  <text x="256" y="288" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Desired Replicas</text>
  <text x="400" y="288" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">3</text>

  <!-- Card: Scale Target -->
  <rect x="616" y="172" width="344" height="130" rx="6" fill="#151722" stroke="#2a2d3e" stroke-width="1"/>
  <text x="632" y="196" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Scale Target</text>
  <line x1="616" y1="202" x2="960" y2="202" stroke="#2a2d3e" stroke-width="1"/>

  <text x="632" y="222" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Kind</text>
  <text x="776" y="222" font-family="Arial, sans-serif" font-size="12" fill="white">Deployment</text>

  <text x="632" y="244" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Name</text>
  <text x="776" y="244" font-family="Arial, sans-serif" font-size="12" fill="#6b9ef4">welcome-app</text>

  <text x="632" y="266" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">API Version</text>
  <text x="776" y="266" font-family="Arial, sans-serif" font-size="12" fill="white">apps/v1</text>

  <text x="632" y="288" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">Last Scale Time</text>
  <text x="776" y="288" font-family="Arial, sans-serif" font-size="12" fill="white">5 minutes ago</text>

  <!-- CPU Metrics card -->
  <rect x="240" y="318" width="720" height="140" rx="6" fill="#151722" stroke="#2a2d3e" stroke-width="1"/>
  <text x="256" y="342" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Metrics</text>
  <line x1="240" y1="348" x2="960" y2="348" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Metrics table header -->
  <text x="256" y="368" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">TYPE</text>
  <text x="380" y="368" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">RESOURCE</text>
  <text x="500" y="368" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">CURRENT</text>
  <text x="600" y="368" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">TARGET</text>
  <text x="700" y="368" font-family="Arial, sans-serif" font-size="11" fill="#6c7280" font-weight="bold">UTILIZATION</text>
  <line x1="240" y1="374" x2="960" y2="374" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Metrics row -->
  <text x="256" y="394" font-family="Arial, sans-serif" font-size="12" fill="white">Resource</text>
  <text x="380" y="394" font-family="Arial, sans-serif" font-size="12" fill="white">cpu</text>
  <text x="500" y="394" font-family="Arial, sans-serif" font-size="12" fill="#3db868" font-weight="bold">45%</text>
  <text x="600" y="394" font-family="Arial, sans-serif" font-size="12" fill="white">70%</text>

  <!-- Progress bar background -->
  <rect x="700" y="383" width="200" height="14" rx="7" fill="#2a2d3e"/>
  <!-- Progress bar fill (45% of 200 = 90px) -->
  <rect x="700" y="383" width="90" height="14" rx="7" fill="#202cac"/>
  <!-- Progress bar target marker at 70% = 140px -->
  <rect x="840" y="381" width="2" height="18" fill="#ff0454" rx="1"/>
  <text x="843" y="376" font-family="Arial, sans-serif" font-size="9" fill="#ff0454">target</text>
  <text x="720" y="411" font-family="Arial, sans-serif" font-size="10" fill="#aab0c4">0%</text>
  <text x="883" y="411" font-family="Arial, sans-serif" font-size="10" fill="#aab0c4">100%</text>

  <!-- Bottom info bar -->
  <rect x="240" y="464" width="720" height="28" rx="4" fill="#0d1a2e" stroke="#202cac" stroke-width="1"/>
  <circle cx="260" cy="478" r="5" fill="#202cac"/>
  <text x="274" y="482" font-family="Arial, sans-serif" font-size="11" fill="#aab0c4">HPA is operating within normal parameters. Next evaluation in ~12s.</text>
</svg>
