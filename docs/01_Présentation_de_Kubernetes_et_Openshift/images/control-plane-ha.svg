<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" width="820" height="360" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="360" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">Plan de contrôle hautement disponible (HA)</text>
  <text x="410" y="48" text-anchor="middle" font-size="12" fill="#666">OpenShift déploie 3 nœuds de contrôle en production — tolérance aux pannes N-1</text>

  <!-- Outer HA box -->
  <rect x="20" y="60" width="780" height="240" rx="10" fill="#e8eaf6" stroke="#202cac" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="410" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">Cluster OpenShift — Control Plane (3 nœuds)</text>

  <!-- Node 1 -->
  <rect x="40" y="88" width="230" height="200" rx="8" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="88" width="230" height="32" rx="8" fill="#202cac"/>
  <rect x="40" y="108" width="230" height="12" fill="#202cac"/>
  <text x="155" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">master-0</text>
  <rect x="58" y="130" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="155" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">kube-apiserver</text>
  <rect x="58" y="165" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="155" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">etcd (leader)</text>
  <rect x="58" y="200" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="155" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">kube-scheduler</text>
  <rect x="58" y="235" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="155" y="253" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">controller-manager</text>

  <!-- Node 2 -->
  <rect x="295" y="88" width="230" height="200" rx="8" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="295" y="88" width="230" height="32" rx="8" fill="#202cac"/>
  <rect x="295" y="108" width="230" height="12" fill="#202cac"/>
  <text x="410" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">master-1</text>
  <rect x="313" y="130" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="410" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">kube-apiserver</text>
  <rect x="313" y="165" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="410" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">etcd (follower)</text>
  <rect x="313" y="200" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="410" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">kube-scheduler</text>
  <rect x="313" y="235" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="410" y="253" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">controller-manager</text>

  <!-- Node 3 -->
  <rect x="550" y="88" width="230" height="200" rx="8" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="550" y="88" width="230" height="32" rx="8" fill="#202cac"/>
  <rect x="550" y="108" width="230" height="12" fill="#202cac"/>
  <text x="665" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">master-2</text>
  <rect x="568" y="130" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="665" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">kube-apiserver</text>
  <rect x="568" y="165" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="665" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">etcd (follower)</text>
  <rect x="568" y="200" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="665" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">kube-scheduler</text>
  <rect x="568" y="235" width="194" height="28" rx="4" fill="#e8eaf6"/>
  <text x="665" y="253" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">controller-manager</text>

  <!-- etcd sync arrows -->
  <line x1="252" y1="179" x2="313" y2="179" stroke="#ff0454" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="507" y1="179" x2="568" y2="179" stroke="#ff0454" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="282" y="174" text-anchor="middle" font-size="9" fill="#ff0454">Raft</text>
  <text x="537" y="174" text-anchor="middle" font-size="9" fill="#ff0454">Raft</text>

  <!-- Note at bottom -->
  <rect x="20" y="315" width="780" height="35" rx="6" fill="white" stroke="#202cac" stroke-width="1"/>
  <text x="410" y="330" text-anchor="middle" font-size="11" fill="#202cac" font-weight="bold">Load Balancer API → distribue les requêtes oc/kubectl vers les 3 API servers</text>
  <text x="410" y="344" text-anchor="middle" font-size="11" fill="#555">etcd utilise le consensus Raft : quorum = 2/3 nœuds → cluster tolérant à la perte d'1 master</text>
</svg>
