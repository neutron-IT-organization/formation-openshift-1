<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="580" fill="#1a1a2e" rx="8"/>
  <!-- Browser bar -->
  <rect x="0" y="0" width="900" height="36" fill="#2d2d44" rx="8"/>
  <rect x="0" y="20" width="900" height="16" fill="#2d2d44"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="100" y="8" width="650" height="20" rx="10" fill="#1a1a2e"/>
  <text x="425" y="22" text-anchor="middle" font-size="11" fill="#aaa">https://oauth-openshift.apps.neutron-sno-office.neutron-it.fr/login</text>

  <!-- Page background -->
  <rect x="0" y="36" width="900" height="544" fill="#151515"/>

  <!-- Red Hat header band -->
  <rect x="0" y="36" width="900" height="60" fill="#202cac"/>
  <text x="40" y="74" font-size="22" font-weight="bold" fill="white">Red Hat OpenShift</text>
  <text x="40" y="92" font-size="11" fill="#a0a8e0">Container Platform 4.14</text>

  <!-- Login card -->
  <rect x="310" y="130" width="280" height="340" rx="8" fill="#212427" stroke="#3c3f42" stroke-width="1"/>

  <!-- Card header -->
  <text x="450" y="170" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Se connecter</text>
  <text x="450" y="190" text-anchor="middle" font-size="12" fill="#8a8d90">Choisissez votre fournisseur d'identité</text>

  <!-- Divider -->
  <line x1="330" y1="205" x2="570" y2="205" stroke="#3c3f42" stroke-width="1"/>

  <!-- Identity provider button -->
  <rect x="330" y="220" width="240" height="50" rx="4" fill="#202cac"/>
  <rect x="330" y="220" width="240" height="50" rx="4" fill="none" stroke="#3050d0" stroke-width="1"/>
  <text x="450" y="249" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Neutron Guest Identity</text>
  <text x="450" y="264" text-anchor="middle" font-size="11" fill="#c0c8f0">Management</text>

  <!-- Other providers (greyed out) -->
  <rect x="330" y="285" width="240" height="40" rx="4" fill="#2c2f33" stroke="#3c3f42" stroke-width="1"/>
  <text x="450" y="309" text-anchor="middle" font-size="12" fill="#6a6e73">htpasswd</text>

  <!-- Divider -->
  <line x1="330" y1="340" x2="570" y2="340" stroke="#3c3f42" stroke-width="1"/>

  <!-- Footer note -->
  <text x="450" y="365" text-anchor="middle" font-size="11" fill="#6a6e73">Vos identifiants :</text>
  <rect x="350" y="375" width="200" height="55" rx="4" fill="#1a1d20"/>
  <text x="360" y="395" font-size="11" fill="#8a8d90">Utilisateur :</text>
  <text x="440" y="395" font-size="11" font-weight="bold" fill="#ff0454">&lt;CITY&gt;-user</text>
  <text x="360" y="415" font-size="11" fill="#8a8d90">Mot de passe :</text>
  <text x="440" y="415" font-size="11" font-weight="bold" fill="#ff0454">OpenShift4formation!</text>

  <!-- Bottom help -->
  <text x="450" y="450" text-anchor="middle" font-size="11" fill="#6a6e73">ex : prague-user, tokyo-user, paris-user...</text>
</svg>
