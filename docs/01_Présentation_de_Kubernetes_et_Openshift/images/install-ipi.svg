<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#202cac"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff0454"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#202cac">IPI — Installer Provisioned Infrastructure</text>
  <text x="410" y="52" text-anchor="middle" font-size="12" fill="#666">L'installateur crée et gère l'infrastructure automatiquement</text>

  <!-- Step 1: Operator -->
  <rect x="30" y="80" width="140" height="70" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="100" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Opérateur</text>
  <text x="100" y="126" text-anchor="middle" font-size="11" fill="#cdd6ff">Lance</text>
  <text x="100" y="140" text-anchor="middle" font-size="11" fill="#cdd6ff">openshift-install</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="115" x2="215" y2="115" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="192" y="108" text-anchor="middle" font-size="10" fill="#555">install-config.yaml</text>

  <!-- Step 2: Installer -->
  <rect x="215" y="80" width="140" height="70" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="285" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Installateur</text>
  <text x="285" y="126" text-anchor="middle" font-size="11" fill="#cdd6ff">openshift-install</text>
  <text x="285" y="140" text-anchor="middle" font-size="11" fill="#cdd6ff">create cluster</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="115" x2="400" y2="115" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="377" y="108" text-anchor="middle" font-size="10" fill="#555">API calls</text>

  <!-- Step 3: Cloud Provider -->
  <rect x="400" y="80" width="140" height="70" rx="8" fill="#e8eaf6" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="470" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#202cac">Cloud Provider</text>
  <text x="470" y="126" text-anchor="middle" font-size="11" fill="#555">AWS / GCP / Azure</text>
  <text x="470" y="140" text-anchor="middle" font-size="11" fill="#555">vSphere / RHV</text>

  <!-- Arrow 3 down -->
  <line x1="470" y1="150" x2="470" y2="185" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="172" font-size="10" fill="#555">Crée</text>

  <!-- Infrastructure box -->
  <rect x="350" y="185" width="240" height="110" rx="8" fill="#f0f4ff" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="470" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">Infrastructure créée automatiquement</text>
  <rect x="365" y="215" width="95" height="30" rx="4" fill="#202cac"/>
  <text x="412" y="234" text-anchor="middle" font-size="11" fill="white">VMs Control Plane</text>
  <rect x="470" y="215" width="105" height="30" rx="4" fill="#202cac"/>
  <text x="522" y="234" text-anchor="middle" font-size="11" fill="white">VMs Worker Nodes</text>
  <rect x="365" y="254" width="95" height="26" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="412" y="271" text-anchor="middle" font-size="10" fill="#333">Load Balancers</text>
  <rect x="470" y="254" width="105" height="26" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="522" y="271" text-anchor="middle" font-size="10" fill="#333">DNS / VPC / Storage</text>

  <!-- Arrow 4: back to installer -->
  <line x1="350" y1="240" x2="285" y2="240" stroke="#202cac" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="317" y="232" text-anchor="middle" font-size="10" fill="#555">Progresse</text>

  <!-- Bootstrap box -->
  <rect x="30" y="185" width="230" height="110" rx="8" fill="#fff" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">Bootstrap (temporaire)</text>
  <rect x="45" y="215" width="200" height="26" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="145" y="232" text-anchor="middle" font-size="11" fill="#333">VM bootstrap créée en premier</text>
  <rect x="45" y="250" width="200" height="30" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="145" y="264" text-anchor="middle" font-size="10" fill="#333">Installe le Control Plane</text>
  <text x="145" y="276" text-anchor="middle" font-size="10" fill="#555">Puis se supprime automatiquement</text>

  <!-- Arrow bootstrap -->
  <line x1="215" y1="200" x2="285" y2="165" stroke="#202cac" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Result box -->
  <rect x="30" y="320" width="760" height="60" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="410" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Cluster OpenShift opérationnel</text>
  <text x="410" y="364" text-anchor="middle" font-size="11" fill="#cdd6ff">kubeconfig + credentials générés dans le répertoire auth/ — console accessible sur https://console-openshift-console.apps.&lt;cluster&gt;.&lt;domain&gt;</text>

  <!-- Advantages -->
  <rect x="30" y="400" width="370" height="64" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="215" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Avantages IPI</text>
  <text x="45" y="438" font-size="11" fill="#333">✓ Déploiement rapide (30–60 min)</text>
  <text x="45" y="454" font-size="11" fill="#333">✓ Infra entièrement gérée par OpenShift (MCO, upgrades)</text>

  <!-- Constraints -->
  <rect x="420" y="400" width="370" height="64" rx="6" fill="#fff8e8" stroke="#f0ab00" stroke-width="1"/>
  <text x="605" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Contraintes IPI</text>
  <text x="435" y="438" font-size="11" fill="#333">⚠ Nécessite accès API Cloud Provider</text>
  <text x="435" y="454" font-size="11" fill="#333">⚠ Moins de flexibilité sur l'infrastructure existante</text>
</svg>
