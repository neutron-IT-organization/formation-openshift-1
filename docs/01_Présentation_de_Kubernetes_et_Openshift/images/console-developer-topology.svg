<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <!-- Browser chrome -->
  <rect width="1000" height="620" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="0" width="1000" height="36" fill="#2d2d44" rx="8"/>
  <rect x="0" y="20" width="1000" height="16" fill="#2d2d44"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="100" y="8" width="700" height="20" rx="10" fill="#1a1a2e"/>
  <text x="450" y="22" text-anchor="middle" font-size="11" fill="#aaa">https://console-openshift-console.apps.neutron-sno-office.neutron-it.fr/topology/ns/prague-user-ns</text>

  <!-- Page background -->
  <rect x="0" y="36" width="1000" height="584" fill="#0f0f0f"/>

  <!-- Top navigation bar -->
  <rect x="0" y="36" width="1000" height="48" fill="#1b1d21"/>
  <!-- Red Hat logo placeholder -->
  <rect x="12" y="48" width="28" height="22" rx="2" fill="#ff0454"/>
  <text x="16" y="63" font-size="12" font-weight="bold" fill="white">RH</text>
  <text x="48" y="63" font-size="14" font-weight="bold" fill="white">OpenShift</text>
  <!-- Perspective selector -->
  <rect x="150" y="50" width="110" height="22" rx="3" fill="#202cac"/>
  <text x="205" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Developer</text>
  <!-- Project selector -->
  <rect x="290" y="50" width="180" height="22" rx="3" fill="#2c2f33" stroke="#4a4d52" stroke-width="1"/>
  <text x="380" y="65" text-anchor="middle" font-size="12" fill="#c0c0c0">Project: prague-user-ns</text>
  <!-- Top right buttons -->
  <text x="900" y="65" font-size="12" fill="#6a6e73">prague-user  v</text>

  <!-- Left sidebar -->
  <rect x="0" y="84" width="200" height="536" fill="#1b1d21"/>
  <!-- Sidebar items -->
  <rect x="0" y="110" width="200" height="34" fill="#202cac"/>
  <text x="48" y="132" font-size="13" font-weight="bold" fill="white">Topology</text>
  <text x="20" y="165" font-size="13" fill="#8a8d90">  Observe</text>
  <text x="20" y="197" font-size="13" fill="#8a8d90">  Search</text>
  <text x="20" y="229" font-size="13" fill="#8a8d90">  Builds</text>
  <text x="20" y="261" font-size="13" fill="#8a8d90">  Helm</text>
  <text x="20" y="293" font-size="13" fill="#8a8d90">  Project</text>
  <text x="20" y="325" font-size="13" fill="#8a8d90">  ConfigMaps</text>
  <text x="20" y="357" font-size="13" fill="#8a8d90">  Secrets</text>

  <!-- Main content area -->
  <rect x="200" y="84" width="800" height="536" fill="#0f0f0f"/>

  <!-- Toolbar -->
  <rect x="200" y="84" width="800" height="42" fill="#1b1d21" stroke="#292b2e" stroke-width="0"/>
  <rect x="210" y="95" width="70" height="22" rx="3" fill="#202cac"/>
  <text x="245" y="110" text-anchor="middle" font-size="12" fill="white">+ Add</text>
  <text x="310" y="110" font-size="12" fill="#8a8d90">|  Filter resources...</text>

  <!-- Topology canvas -->
  <rect x="200" y="126" width="800" height="494" fill="#0f0f0f"/>

  <!-- Grid dots -->
  <g fill="#2a2a2a" opacity="0.5">
    <circle cx="260" cy="180" r="1"/><circle cx="320" cy="180" r="1"/><circle cx="380" cy="180" r="1"/>
    <circle cx="440" cy="180" r="1"/><circle cx="500" cy="180" r="1"/><circle cx="560" cy="180" r="1"/>
    <circle cx="620" cy="180" r="1"/><circle cx="680" cy="180" r="1"/><circle cx="740" cy="180" r="1"/>
    <circle cx="260" cy="240" r="1"/><circle cx="320" cy="240" r="1"/><circle cx="380" cy="240" r="1"/>
    <circle cx="440" cy="240" r="1"/><circle cx="500" cy="240" r="1"/><circle cx="560" cy="240" r="1"/>
    <circle cx="620" cy="240" r="1"/><circle cx="680" cy="240" r="1"/>
  </g>

  <!-- App node: olympic-medals-app -->
  <circle cx="400" cy="300" r="52" fill="#1b1d21" stroke="#202cac" stroke-width="2.5"/>
  <circle cx="400" cy="300" r="44" fill="#1b1d21"/>
  <!-- App icon -->
  <rect x="376" y="278" width="48" height="36" rx="4" fill="#202cac"/>
  <text x="400" y="301" text-anchor="middle" font-size="22" fill="white">O</text>
  <text x="400" y="340" text-anchor="middle" font-size="11" fill="white">olympic-medals-app</text>
  <!-- Running indicator (green ring) -->
  <circle cx="400" cy="300" r="52" fill="none" stroke="#3db838" stroke-width="3" stroke-dasharray="330 0"/>
  <!-- Route arrow icon -->
  <rect x="438" y="262" width="20" height="16" rx="3" fill="#3db838"/>
  <text x="448" y="274" text-anchor="middle" font-size="9" fill="white">URL</text>

  <!-- App node: welcome-app -->
  <circle cx="650" cy="300" r="52" fill="#1b1d21" stroke="#202cac" stroke-width="2.5"/>
  <circle cx="650" cy="300" r="44" fill="#1b1d21"/>
  <rect x="626" y="278" width="48" height="36" rx="4" fill="#202cac"/>
  <text x="650" y="301" text-anchor="middle" font-size="22" fill="white">W</text>
  <text x="650" y="340" text-anchor="middle" font-size="11" fill="white">welcome-app</text>
  <circle cx="650" cy="300" r="52" fill="none" stroke="#3db838" stroke-width="3"/>
  <rect x="688" y="262" width="20" height="16" rx="3" fill="#3db838"/>
  <text x="698" y="274" text-anchor="middle" font-size="9" fill="white">URL</text>

  <!-- Info panel on right side -->
  <rect x="820" y="130" width="175" height="200" rx="6" fill="#1b1d21" stroke="#3c3f42" stroke-width="1"/>
  <text x="907" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="white">olympic-medals-app</text>
  <line x1="830" y1="163" x2="985" y2="163" stroke="#3c3f42" stroke-width="1"/>
  <text x="835" y="180" font-size="11" fill="#8a8d90">Pods</text>
  <text x="980" y="180" text-anchor="end" font-size="11" fill="#3db838">1/1 Running</text>
  <text x="835" y="198" font-size="11" fill="#8a8d90">Image</text>
  <text x="835" y="213" font-size="10" fill="#c0c0c0">quay.io/neutron-it/</text>
  <text x="835" y="226" font-size="10" fill="#c0c0c0">olympic-medals-app</text>
  <text x="835" y="245" font-size="11" fill="#8a8d90">Route</text>
  <text x="835" y="260" font-size="10" fill="#202cac">olympic-medals-http-</text>
  <text x="835" y="273" font-size="10" fill="#202cac">prague-user-ns.apps...</text>
  <rect x="835" y="285" width="130" height="24" rx="4" fill="#202cac"/>
  <text x="900" y="301" text-anchor="middle" font-size="11" fill="white">Ouvrir l'URL</text>

  <!-- Legend -->
  <circle cx="230" cy="590" r="8" fill="none" stroke="#3db838" stroke-width="2"/>
  <text x="245" y="594" font-size="11" fill="#8a8d90">Pod Running</text>
  <circle cx="350" cy="590" r="8" fill="none" stroke="#ff0454" stroke-width="2"/>
  <text x="365" y="594" font-size="11" fill="#8a8d90">Pod Error</text>
  <circle cx="460" cy="590" r="8" fill="none" stroke="#f0ab00" stroke-width="2"/>
  <text x="475" y="594" font-size="11" fill="#8a8d90">Pending</text>
</svg>
