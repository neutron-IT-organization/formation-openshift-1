<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" width="820" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#202cac"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="500" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#202cac">UPI — User Provisioned Infrastructure</text>
  <text x="410" y="52" text-anchor="middle" font-size="12" fill="#666">L'opérateur crée l'infrastructure manuellement avant d'installer OpenShift</text>

  <!-- Phase 1 header -->
  <rect x="20" y="68" width="380" height="28" rx="6" fill="#ff0454"/>
  <text x="210" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Phase 1 — Préparation infrastructure (Manuel)</text>

  <!-- Phase 1 steps -->
  <rect x="20" y="100" width="380" height="190" rx="6" fill="white" stroke="#ff0454" stroke-width="1.5"/>

  <rect x="35" y="112" width="350" height="32" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="55" y="130" font-size="12" font-weight="bold" fill="#ff0454">①</text>
  <text x="75" y="130" font-size="11" fill="#333">Créer les VMs (Control Plane + Workers)</text>

  <rect x="35" y="152" width="350" height="32" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="55" y="170" font-size="12" font-weight="bold" fill="#ff0454">②</text>
  <text x="75" y="170" font-size="11" fill="#333">Configurer le réseau (DNS, Load Balancer, VIPs)</text>

  <rect x="35" y="192" width="350" height="32" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="55" y="210" font-size="12" font-weight="bold" fill="#ff0454">③</text>
  <text x="75" y="210" font-size="11" fill="#333">Provisionner le stockage (si nécessaire)</text>

  <rect x="35" y="232" width="350" height="32" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="55" y="250" font-size="12" font-weight="bold" fill="#ff0454">④</text>
  <text x="75" y="250" font-size="11" fill="#333">Générer les Ignition configs (openshift-install)</text>

  <!-- Arrow between phases -->
  <line x1="400" y1="195" x2="425" y2="195" stroke="#202cac" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 2 header -->
  <rect x="425" y="68" width="375" height="28" rx="6" fill="#202cac"/>
  <text x="612" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Phase 2 — Installation OpenShift (Installateur)</text>

  <!-- Phase 2 steps -->
  <rect x="425" y="100" width="375" height="190" rx="6" fill="white" stroke="#202cac" stroke-width="1.5"/>

  <rect x="440" y="112" width="345" height="32" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="460" y="130" font-size="12" font-weight="bold" fill="#202cac">①</text>
  <text x="480" y="130" font-size="11" fill="#333">Démarrer bootstrap node (Ignition)</text>

  <rect x="440" y="152" width="345" height="32" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="460" y="170" font-size="12" font-weight="bold" fill="#202cac">②</text>
  <text x="480" y="170" font-size="11" fill="#333">Bootstrap installe les masters (etcd, API server)</text>

  <rect x="440" y="192" width="345" height="32" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="460" y="210" font-size="12" font-weight="bold" fill="#202cac">③</text>
  <text x="480" y="210" font-size="11" fill="#333">Approuver les CSRs des workers</text>

  <rect x="440" y="232" width="345" height="32" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="460" y="250" font-size="12" font-weight="bold" fill="#202cac">④</text>
  <text x="480" y="250" font-size="11" fill="#333">Cluster operators s'installent et deviennent Available</text>

  <!-- CSR note -->
  <rect x="20" y="305" width="780" height="40" rx="6" fill="#fff8e8" stroke="#f0ab00" stroke-width="1.5"/>
  <text x="410" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Étape manuelle critique : approbation des CSR</text>
  <text x="410" y="337" text-anchor="middle" font-size="11" fill="#555">oc get csr  →  oc adm certificate approve &lt;name&gt;  (à faire pour chaque worker)</text>

  <!-- Result box -->
  <rect x="20" y="360" width="780" height="44" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="410" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Cluster OpenShift opérationnel</text>
  <text x="410" y="396" text-anchor="middle" font-size="11" fill="#cdd6ff">openshift-install wait-for install-complete — vérifie que tous les cluster operators sont Ready</text>

  <!-- Comparison -->
  <rect x="20" y="420" width="380" height="64" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="210" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Avantages UPI</text>
  <text x="35" y="458" font-size="11" fill="#333">✓ Contrôle total sur l'infrastructure</text>
  <text x="35" y="474" font-size="11" fill="#333">✓ Compatible infra existante (bare metal, réseau custom)</text>

  <rect x="420" y="420" width="380" height="64" rx="6" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="610" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff0454">Contraintes UPI</text>
  <text x="435" y="458" font-size="11" fill="#333">⚠ Processus long et complexe (plusieurs heures)</text>
  <text x="435" y="474" font-size="11" fill="#333">⚠ Responsabilité infra à la charge de l'opérateur</text>
</svg>
