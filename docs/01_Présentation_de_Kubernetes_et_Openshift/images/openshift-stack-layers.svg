<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="420" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">La famille OpenShift — Couches de la plateforme</text>

  <!-- Layer 1: Hardware/Infrastructure (bottom) -->
  <rect x="30" y="370" width="640" height="38" rx="6" fill="#888" filter="url(#shadow)"/>
  <text x="350" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Infrastructure (Cloud, Bare Metal, VM, Edge)</text>

  <!-- Layer 2: RHCOS -->
  <rect x="30" y="324" width="640" height="38" rx="6" fill="#555" filter="url(#shadow)"/>
  <text x="350" y="347" text-anchor="middle" font-size="13" font-weight="bold" fill="white">RHCOS — Red Hat Enterprise Linux CoreOS</text>

  <!-- Layer 3: Kubernetes -->
  <rect x="30" y="278" width="640" height="38" rx="6" fill="#202cac" filter="url(#shadow)"/>
  <text x="350" y="301" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Kubernetes (orchestration de conteneurs)</text>

  <!-- Layer 4: OpenShift Platform (OCP) -->
  <rect x="30" y="185" width="640" height="85" rx="6" fill="#1a22a0" filter="url(#shadow)"/>
  <text x="350" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="white">OpenShift Container Platform (OCP)</text>
  <rect x="50" y="218" width="178" height="36" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="139" y="240" text-anchor="middle" font-size="11" fill="white">Réseau (OVN-K8s)</text>
  <rect x="240" y="218" width="178" height="36" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="329" y="240" text-anchor="middle" font-size="11" fill="white">Monitoring (Prometheus)</text>
  <rect x="430" y="218" width="220" height="36" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="540" y="240" text-anchor="middle" font-size="11" fill="white">Registry / Router / OAuth</text>

  <!-- OKE badge -->
  <rect x="30" y="130" width="200" height="48" rx="6" fill="#ff0454" filter="url(#shadow)"/>
  <text x="130" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="white">OKD / OKE</text>
  <text x="130" y="168" text-anchor="middle" font-size="10" fill="white">Community / Kubernetes Engine</text>

  <!-- OCP badge -->
  <rect x="250" y="130" width="200" height="48" rx="6" fill="#202cac" filter="url(#shadow)"/>
  <text x="350" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="white">OCP</text>
  <text x="350" y="168" text-anchor="middle" font-size="10" fill="white">Container Platform (Enterprise)</text>

  <!-- OPP badge -->
  <rect x="470" y="130" width="200" height="48" rx="6" fill="#202cac" filter="url(#shadow)"/>
  <text x="570" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="white">OPP / ARO / ROSA</text>
  <text x="570" y="168" text-anchor="middle" font-size="10" fill="white">Managed / Cloud Platforms</text>

  <!-- Top label -->
  <text x="350" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Distributions et offres</text>
  <line x1="30" y1="70" x2="670" y2="70" stroke="#ccc" stroke-width="1"/>

  <!-- Connecting lines from distributions to platform -->
  <line x1="130" y1="178" x2="130" y2="182" stroke="#ff0454" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="350" y1="178" x2="350" y2="182" stroke="#202cac" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="570" y1="178" x2="570" y2="182" stroke="#202cac" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Layer labels on right -->
  <text x="682" y="393" text-anchor="start" font-size="9" fill="#888">Couche 1</text>
  <text x="682" y="347" text-anchor="start" font-size="9" fill="#555">Couche 2</text>
  <text x="682" y="301" text-anchor="start" font-size="9" fill="#202cac">Couche 3</text>
  <text x="682" y="230" text-anchor="start" font-size="9" fill="#1a22a0">Couche 4</text>
</svg>
