<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#202cac"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="440" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">Architecture Kubernetes / OpenShift</text>

  <!-- Control Plane zone -->
  <rect x="15" y="40" width="790" height="170" rx="8" fill="#e8eaf6" stroke="#202cac" stroke-width="2"/>
  <text x="25" y="57" font-size="12" font-weight="bold" fill="#202cac">Plan de contrôle</text>

  <!-- API Server -->
  <rect x="30" y="64" width="170" height="136" rx="6" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="64" width="170" height="28" rx="6" fill="#202cac"/>
  <rect x="30" y="82" width="170" height="10" fill="#202cac"/>
  <text x="115" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="white">kube-apiserver</text>
  <text x="115" y="110" text-anchor="middle" font-size="10" fill="#555">Point d'entrée unique</text>
  <text x="115" y="124" text-anchor="middle" font-size="10" fill="#555">REST API</text>
  <text x="115" y="138" text-anchor="middle" font-size="10" fill="#555">Authentification</text>
  <text x="115" y="152" text-anchor="middle" font-size="10" fill="#555">Autorisation</text>
  <text x="115" y="166" text-anchor="middle" font-size="10" fill="#555">Admission</text>
  <text x="115" y="186" text-anchor="middle" font-size="10" font-style="italic" fill="#202cac">kubectl / oc</text>

  <!-- etcd -->
  <rect x="215" y="64" width="155" height="136" rx="6" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="215" y="64" width="155" height="28" rx="6" fill="#202cac"/>
  <rect x="215" y="82" width="155" height="10" fill="#202cac"/>
  <text x="292" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="white">etcd</text>
  <text x="292" y="110" text-anchor="middle" font-size="10" fill="#555">Base de données</text>
  <text x="292" y="124" text-anchor="middle" font-size="10" fill="#555">clé-valeur distribuée</text>
  <text x="292" y="138" text-anchor="middle" font-size="10" fill="#555">Source de vérité</text>
  <text x="292" y="152" text-anchor="middle" font-size="10" fill="#555">Consensus Raft</text>
  <text x="292" y="166" text-anchor="middle" font-size="10" fill="#555">3 instances en HA</text>

  <!-- Scheduler -->
  <rect x="385" y="64" width="155" height="136" rx="6" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="385" y="64" width="155" height="28" rx="6" fill="#202cac"/>
  <rect x="385" y="82" width="155" height="10" fill="#202cac"/>
  <text x="462" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="white">kube-scheduler</text>
  <text x="462" y="110" text-anchor="middle" font-size="10" fill="#555">Placement des pods</text>
  <text x="462" y="124" text-anchor="middle" font-size="10" fill="#555">Filtrage + Scoring</text>
  <text x="462" y="138" text-anchor="middle" font-size="10" fill="#555">Ressources / Affinité</text>
  <text x="462" y="152" text-anchor="middle" font-size="10" fill="#555">Taints / Tolerations</text>

  <!-- Controller Manager -->
  <rect x="555" y="64" width="240" height="136" rx="6" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="555" y="64" width="240" height="28" rx="6" fill="#202cac"/>
  <rect x="555" y="82" width="240" height="10" fill="#202cac"/>
  <text x="675" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="white">controller-manager</text>
  <text x="675" y="110" text-anchor="middle" font-size="10" fill="#555">ReplicaSet controller</text>
  <text x="675" y="124" text-anchor="middle" font-size="10" fill="#555">Deployment controller</text>
  <text x="675" y="138" text-anchor="middle" font-size="10" fill="#555">Node controller</text>
  <text x="675" y="152" text-anchor="middle" font-size="10" fill="#555">ServiceAccount controller</text>
  <text x="675" y="166" text-anchor="middle" font-size="10" fill="#555">Endpoint controller</text>

  <!-- Worker Nodes zone -->
  <rect x="15" y="226" width="790" height="180" rx="8" fill="#f5f5f5" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="25" y="243" font-size="12" font-weight="bold" fill="#555">Nœuds de calcul (Workers)</text>

  <!-- Worker 1 -->
  <rect x="30" y="252" width="235" height="144" rx="6" fill="white" stroke="#555" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="252" width="235" height="24" rx="6" fill="#555"/>
  <rect x="30" y="265" width="235" height="11" fill="#555"/>
  <text x="147" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="white">worker-0</text>
  <rect x="44" y="280" width="207" height="22" rx="3" fill="#e8eaf6"/>
  <text x="147" y="295" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">kubelet</text>
  <rect x="44" y="308" width="207" height="22" rx="3" fill="#e8eaf6"/>
  <text x="147" y="323" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">CRI-O</text>
  <rect x="44" y="336" width="98" height="22" rx="3" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="93" y="351" text-anchor="middle" font-size="9" fill="#ff0454">Pod app-1</text>
  <rect x="149" y="336" width="102" height="22" rx="3" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="200" y="351" text-anchor="middle" font-size="9" fill="#ff0454">Pod app-2</text>
  <rect x="44" y="364" width="207" height="22" rx="3" fill="#e8eaf6"/>
  <text x="147" y="379" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">kube-proxy</text>

  <!-- Worker 2 -->
  <rect x="292" y="252" width="235" height="144" rx="6" fill="white" stroke="#555" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="292" y="252" width="235" height="24" rx="6" fill="#555"/>
  <rect x="292" y="265" width="235" height="11" fill="#555"/>
  <text x="409" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="white">worker-1</text>
  <rect x="306" y="280" width="207" height="22" rx="3" fill="#e8eaf6"/>
  <text x="409" y="295" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">kubelet</text>
  <rect x="306" y="308" width="207" height="22" rx="3" fill="#e8eaf6"/>
  <text x="409" y="323" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">CRI-O</text>
  <rect x="306" y="336" width="98" height="22" rx="3" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="355" y="351" text-anchor="middle" font-size="9" fill="#ff0454">Pod app-3</text>
  <rect x="411" y="336" width="102" height="22" rx="3" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="462" y="351" text-anchor="middle" font-size="9" fill="#ff0454">Pod app-4</text>
  <rect x="306" y="364" width="207" height="22" rx="3" fill="#e8eaf6"/>
  <text x="409" y="379" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">kube-proxy</text>

  <!-- Worker 3 -->
  <rect x="555" y="252" width="240" height="144" rx="6" fill="white" stroke="#555" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="555" y="252" width="240" height="24" rx="6" fill="#555"/>
  <rect x="555" y="265" width="240" height="11" fill="#555"/>
  <text x="675" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="white">worker-2</text>
  <rect x="569" y="280" width="212" height="22" rx="3" fill="#e8eaf6"/>
  <text x="675" y="295" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">kubelet</text>
  <rect x="569" y="308" width="212" height="22" rx="3" fill="#e8eaf6"/>
  <text x="675" y="323" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">CRI-O</text>
  <rect x="569" y="336" width="100" height="22" rx="3" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="619" y="351" text-anchor="middle" font-size="9" fill="#ff0454">Pod app-5</text>
  <rect x="678" y="336" width="103" height="22" rx="3" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="729" y="351" text-anchor="middle" font-size="9" fill="#ff0454">Pod app-6</text>
  <rect x="569" y="364" width="212" height="22" rx="3" fill="#e8eaf6"/>
  <text x="675" y="379" text-anchor="middle" font-size="10" fill="#202cac" font-weight="bold">kube-proxy</text>

  <!-- Arrows: apiserver to workers (kubelet) -->
  <line x1="115" y1="200" x2="115" y2="248" stroke="#202cac" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="115" y1="226" x2="409" y2="248" stroke="#202cac" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="115" y1="213" x2="675" y2="248" stroke="#202cac" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- TLS label -->
  <text x="88" y="232" font-size="9" fill="#202cac">TLS</text>
</svg>
