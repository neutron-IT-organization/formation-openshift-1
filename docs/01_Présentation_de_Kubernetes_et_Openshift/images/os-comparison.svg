<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">Comparaison des systèmes d'exploitation Linux</text>
  <text x="430" y="50" text-anchor="middle" font-size="12" fill="#666">OpenShift utilise RHCOS — un OS immuable et optimisé pour les conteneurs</text>

  <!-- Table header -->
  <rect x="20" y="62" width="820" height="38" rx="6" fill="#202cac"/>
  <text x="110" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Caractéristique</text>
  <text x="270" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Fedora Server</text>
  <text x="400" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CentOS Stream</text>
  <text x="530" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RHEL</text>
  <text x="660" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Fedora CoreOS</text>
  <text x="790" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff0454">RHCOS ★</text>

  <!-- Grid lines (vertical) -->
  <line x1="200" y1="62" x2="200" y2="410" stroke="#ddd" stroke-width="1"/>
  <line x1="340" y1="62" x2="340" y2="410" stroke="#ddd" stroke-width="1"/>
  <line x1="470" y1="62" x2="470" y2="410" stroke="#ddd" stroke-width="1"/>
  <line x1="600" y1="62" x2="600" y2="410" stroke="#ddd" stroke-width="1"/>
  <line x1="730" y1="62" x2="730" y2="410" stroke="#ddd" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20" y="100" width="820" height="40" fill="#f0f4ff"/>
  <text x="30" y="124" font-size="12" font-weight="bold" fill="#333">Type d'OS</text>
  <text x="270" y="124" text-anchor="middle" font-size="11" fill="#555">Général</text>
  <text x="400" y="124" text-anchor="middle" font-size="11" fill="#555">Général</text>
  <text x="530" y="124" text-anchor="middle" font-size="11" fill="#555">Général / Entreprise</text>
  <text x="660" y="124" text-anchor="middle" font-size="11" fill="#555">Immuable</text>
  <text x="790" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Immuable / Conteneurs</text>

  <!-- Row 2 -->
  <rect x="20" y="140" width="820" height="40" fill="white"/>
  <text x="30" y="164" font-size="12" font-weight="bold" fill="#333">Mises à jour</text>
  <text x="270" y="164" text-anchor="middle" font-size="11" fill="#555">dnf/rpm</text>
  <text x="400" y="164" text-anchor="middle" font-size="11" fill="#555">dnf/rpm</text>
  <text x="530" y="164" text-anchor="middle" font-size="11" fill="#555">dnf/rpm</text>
  <text x="660" y="164" text-anchor="middle" font-size="11" fill="#555">Atomiques (rpm-ostree)</text>
  <text x="790" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Atomiques (MCO)</text>

  <!-- Row 3 -->
  <rect x="20" y="180" width="820" height="40" fill="#f0f4ff"/>
  <text x="30" y="204" font-size="12" font-weight="bold" fill="#333">Filesystem root</text>
  <text x="270" y="204" text-anchor="middle" font-size="11" fill="#555">Lecture/Écriture</text>
  <text x="400" y="204" text-anchor="middle" font-size="11" fill="#555">Lecture/Écriture</text>
  <text x="530" y="204" text-anchor="middle" font-size="11" fill="#555">Lecture/Écriture</text>
  <text x="660" y="204" text-anchor="middle" font-size="11" fill="#555">Lecture seule</text>
  <text x="790" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Lecture seule</text>

  <!-- Row 4 -->
  <rect x="20" y="220" width="820" height="40" fill="white"/>
  <text x="30" y="244" font-size="12" font-weight="bold" fill="#333">Runtime conteneurs</text>
  <text x="270" y="244" text-anchor="middle" font-size="11" fill="#555">À installer</text>
  <text x="400" y="244" text-anchor="middle" font-size="11" fill="#555">À installer</text>
  <text x="530" y="244" text-anchor="middle" font-size="11" fill="#555">À installer</text>
  <text x="660" y="244" text-anchor="middle" font-size="11" fill="#555">CRI-O (optionnel)</text>
  <text x="790" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">CRI-O intégré</text>

  <!-- Row 5 -->
  <rect x="20" y="260" width="820" height="40" fill="#f0f4ff"/>
  <text x="30" y="284" font-size="12" font-weight="bold" fill="#333">Gestion config</text>
  <text x="270" y="284" text-anchor="middle" font-size="11" fill="#555">Manuelle / Ansible</text>
  <text x="400" y="284" text-anchor="middle" font-size="11" fill="#555">Manuelle / Ansible</text>
  <text x="530" y="284" text-anchor="middle" font-size="11" fill="#555">Manuelle / Ansible</text>
  <text x="660" y="284" text-anchor="middle" font-size="11" fill="#555">Ignition</text>
  <text x="790" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Ignition + MCO</text>

  <!-- Row 6 -->
  <rect x="20" y="300" width="820" height="40" fill="white"/>
  <text x="30" y="324" font-size="12" font-weight="bold" fill="#333">Rollback possible</text>
  <text x="270" y="324" text-anchor="middle" font-size="11" fill="#555">Non</text>
  <text x="400" y="324" text-anchor="middle" font-size="11" fill="#555">Non</text>
  <text x="530" y="324" text-anchor="middle" font-size="11" fill="#555">Non</text>
  <text x="660" y="324" text-anchor="middle" font-size="11" fill="#555">Oui</text>
  <text x="790" y="324" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Oui</text>

  <!-- Row 7 -->
  <rect x="20" y="340" width="820" height="40" fill="#f0f4ff"/>
  <text x="30" y="364" font-size="12" font-weight="bold" fill="#333">Intégration OpenShift</text>
  <text x="270" y="364" text-anchor="middle" font-size="11" fill="#555">Non officielle</text>
  <text x="400" y="364" text-anchor="middle" font-size="11" fill="#555">Non officielle</text>
  <text x="530" y="364" text-anchor="middle" font-size="11" fill="#555">Worker uniquement</text>
  <text x="660" y="364" text-anchor="middle" font-size="11" fill="#555">Non</text>
  <text x="790" y="364" text-anchor="middle" font-size="11" font-weight="bold" fill="#202cac">Native (tous nœuds)</text>

  <!-- Footer note -->
  <rect x="20" y="388" width="820" height="24" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="430" y="404" text-anchor="middle" font-size="11" fill="#ff0454" font-weight="bold">★ RHCOS est le seul OS supporté pour les nœuds Control Plane OpenShift</text>

  <!-- Table border -->
  <rect x="20" y="62" width="820" height="350" rx="6" fill="none" stroke="#202cac" stroke-width="1.5"/>
</svg>
