<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Red Hat Display', 'RedHatDisplay', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="520" fill="#0f0f0f"/>

  <!-- Top navigation bar -->
  <rect width="1000" height="48" fill="#1a1a1a"/>
  <rect width="1000" height="1" y="48" fill="#333"/>

  <!-- OpenShift logo/branding -->
  <!-- Red circle logo -->
  <circle cx="24" cy="24" r="12" fill="#ff0454"/>
  <text x="22" y="28" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">O</text>
  <!-- Brand text -->
  <text x="42" y="20" fill="#ff0454" font-size="13" font-weight="700">Red Hat</text>
  <text x="42" y="35" fill="#e8e8e8" font-size="11" font-weight="400">OpenShift</text>

  <!-- Separator -->
  <rect x="140" y="12" width="1" height="24" fill="#444"/>

  <!-- Cluster name -->
  <text x="155" y="28" fill="#c0c0c0" font-size="12">cluster-prod-01</text>

  <!-- Top right icons -->
  <text x="850" y="30" fill="#a0a0a0" font-size="11">admin</text>
  <rect x="890" y="14" width="20" height="20" rx="10" fill="#333"/>
  <text x="900" y="28" fill="#e0e0e0" font-size="11" text-anchor="middle">A</text>
  <text x="925" y="28" fill="#a0a0a0" font-size="18">?</text>
  <rect x="950" y="14" width="20" height="20" rx="3" fill="#333"/>
  <text x="960" y="28" fill="#a0a0a0" font-size="14" text-anchor="middle">&#9776;</text>

  <!-- Perspective selector -->
  <rect x="680" y="13" width="140" height="22" rx="3" fill="#202020" stroke="#555" stroke-width="1"/>
  <text x="692" y="28" fill="#c0c0c0" font-size="11">Administrator</text>
  <text x="808" y="28" fill="#888" font-size="10">&#9660;</text>

  <!-- Left sidebar -->
  <rect x="0" y="49" width="220" height="471" fill="#161616"/>
  <rect x="220" y="49" width="1" height="471" fill="#2a2a2a"/>

  <!-- Sidebar nav items -->
  <!-- Home -->
  <text x="20" y="82" fill="#8a8a8a" font-size="11" font-weight="500">Home</text>

  <!-- Operators -->
  <text x="20" y="112" fill="#8a8a8a" font-size="11" font-weight="500">Operators</text>

  <!-- Workloads -->
  <text x="20" y="142" fill="#8a8a8a" font-size="11" font-weight="500">Workloads</text>

  <!-- Networking - HIGHLIGHTED -->
  <rect x="0" y="152" width="220" height="28" fill="#202cac" opacity="0.25"/>
  <rect x="0" y="152" width="3" height="28" fill="#202cac"/>
  <text x="20" y="171" fill="#e0e8ff" font-size="12" font-weight="700">Networking</text>
  <text x="210" y="171" fill="#a0b0ff" font-size="12" text-anchor="end">&#9660;</text>

  <!-- Networking sub-items -->
  <rect x="0" y="180" width="220" height="24" fill="#1a1a1a"/>
  <text x="34" y="196" fill="#a0a8d0" font-size="11">Services</text>

  <rect x="0" y="204" width="220" height="24" fill="#1a1a1a"/>
  <text x="34" y="220" fill="#a0a8d0" font-size="11">Routes</text>

  <rect x="0" y="228" width="220" height="24" fill="#1a1a1a"/>
  <text x="34" y="244" fill="#8a8a8a" font-size="11">Ingresses</text>

  <rect x="0" y="252" width="220" height="24" fill="#1a1a1a"/>
  <text x="34" y="268" fill="#8a8a8a" font-size="11">Network Policies</text>

  <!-- Storage -->
  <text x="20" y="302" fill="#8a8a8a" font-size="11" font-weight="500">Storage</text>

  <!-- User Management -->
  <text x="20" y="332" fill="#8a8a8a" font-size="11" font-weight="500">User Management</text>

  <!-- Administration -->
  <text x="20" y="362" fill="#8a8a8a" font-size="11" font-weight="500">Administration</text>

  <!-- Main content area -->
  <!-- Breadcrumb -->
  <text x="240" y="75" fill="#8a8a8a" font-size="11">Networking</text>
  <text x="308" y="75" fill="#8a8a8a" font-size="11"> / </text>
  <text x="320" y="75" fill="#c0c8ff" font-size="11">Services</text>

  <!-- Page title -->
  <text x="240" y="105" fill="#f0f0f0" font-size="18" font-weight="700">Services</text>

  <!-- Project selector -->
  <rect x="240" y="115" width="280" height="24" rx="3" fill="#1e1e1e" stroke="#404040" stroke-width="1"/>
  <text x="252" y="132" fill="#8a8a8a" font-size="11">Project:</text>
  <text x="298" y="132" fill="#c0c8ff" font-size="11">welcome-project</text>
  <text x="508" y="132" fill="#888" font-size="10" text-anchor="end">&#9660;</text>

  <!-- Create button -->
  <rect x="868" y="115" width="112" height="26" rx="3" fill="#202cac"/>
  <text x="924" y="133" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">Create Service</text>

  <!-- Filter bar -->
  <rect x="240" y="150" width="300" height="28" rx="3" fill="#1e1e1e" stroke="#404040" stroke-width="1"/>
  <text x="256" y="169" fill="#666" font-size="11">Filter by name...</text>
  <text x="250" y="169" fill="#555" font-size="13">&#128269;</text>

  <!-- Services table header -->
  <rect x="240" y="190" width="740" height="32" fill="#1e1e1e" rx="3 3 0 0"/>
  <rect x="240" y="222" width="740" height="1" fill="#333"/>

  <text x="260" y="211" fill="#c0c0c0" font-size="11" font-weight="600">Name</text>
  <text x="430" y="211" fill="#c0c0c0" font-size="11" font-weight="600">Namespace</text>
  <text x="570" y="211" fill="#c0c0c0" font-size="11" font-weight="600">Type</text>
  <text x="660" y="211" fill="#c0c0c0" font-size="11" font-weight="600">Cluster IP</text>
  <text x="790" y="211" fill="#c0c0c0" font-size="11" font-weight="600">Port(s)</text>

  <!-- Column sort arrows -->
  <text x="290" y="211" fill="#555" font-size="9">&#9660;</text>

  <!-- Row 1: welcome-app -->
  <rect x="240" y="223" width="740" height="38" fill="#141414"/>
  <rect x="240" y="261" width="740" height="1" fill="#2a2a2a"/>
  <text x="260" y="247" fill="#7090ff" font-size="12" font-weight="500">welcome-app</text>
  <text x="430" y="247" fill="#a0a0a0" font-size="11">welcome-project</text>
  <rect x="568" y="234" width="54" height="16" rx="8" fill="#1a2a1a"/>
  <text x="595" y="246" fill="#5ec45e" font-size="10" text-anchor="middle">ClusterIP</text>
  <text x="660" y="247" fill="#a0a0a0" font-size="11">172.30.47.182</text>
  <text x="790" y="247" fill="#a0a0a0" font-size="11">8080/TCP</text>
  <text x="958" y="247" fill="#555" font-size="16" text-anchor="end">&#8942;</text>

  <!-- Row 2: postgresql -->
  <rect x="240" y="262" width="740" height="38" fill="#141414"/>
  <rect x="240" y="300" width="740" height="1" fill="#2a2a2a"/>
  <text x="260" y="286" fill="#7090ff" font-size="12" font-weight="500">postgresql</text>
  <text x="430" y="286" fill="#a0a0a0" font-size="11">welcome-project</text>
  <rect x="568" y="273" width="54" height="16" rx="8" fill="#1a2a1a"/>
  <text x="595" y="285" fill="#5ec45e" font-size="10" text-anchor="middle">ClusterIP</text>
  <text x="660" y="286" fill="#a0a0a0" font-size="11">172.30.12.209</text>
  <text x="790" y="286" fill="#a0a0a0" font-size="11">5432/TCP</text>
  <text x="958" y="286" fill="#555" font-size="16" text-anchor="end">&#8942;</text>

  <!-- Row 3: welcome-app-lb (LoadBalancer) -->
  <rect x="240" y="301" width="740" height="38" fill="#141414"/>
  <rect x="240" y="339" width="740" height="1" fill="#2a2a2a"/>
  <text x="260" y="325" fill="#7090ff" font-size="12" font-weight="500">welcome-app-external</text>
  <text x="430" y="325" fill="#a0a0a0" font-size="11">welcome-project</text>
  <rect x="562" y="312" width="68" height="16" rx="8" fill="#2a1a0a"/>
  <text x="596" y="324" fill="#e08030" font-size="10" text-anchor="middle">NodePort</text>
  <text x="660" y="325" fill="#a0a0a0" font-size="11">172.30.88.14</text>
  <text x="790" y="325" fill="#a0a0a0" font-size="11">80:30007/TCP</text>
  <text x="958" y="325" fill="#555" font-size="16" text-anchor="end">&#8942;</text>

  <!-- Divider between Services and Routes -->
  <rect x="240" y="348" width="740" height="1" fill="#333"/>

  <!-- Routes section title -->
  <text x="240" y="378" fill="#f0f0f0" font-size="16" font-weight="700">Routes</text>

  <!-- Routes table header -->
  <rect x="240" y="390" width="740" height="30" fill="#1e1e1e"/>
  <rect x="240" y="420" width="740" height="1" fill="#333"/>

  <text x="260" y="410" fill="#c0c0c0" font-size="11" font-weight="600">Name</text>
  <text x="390" y="410" fill="#c0c0c0" font-size="11" font-weight="600">Location (Host)</text>
  <text x="660" y="410" fill="#c0c0c0" font-size="11" font-weight="600">Service</text>
  <text x="790" y="410" fill="#c0c0c0" font-size="11" font-weight="600">TLS</text>
  <text x="890" y="410" fill="#c0c0c0" font-size="11" font-weight="600">Status</text>

  <!-- Route row 1 -->
  <rect x="240" y="421" width="740" height="38" fill="#141414"/>
  <rect x="240" y="459" width="740" height="1" fill="#2a2a2a"/>
  <text x="260" y="445" fill="#7090ff" font-size="12" font-weight="500">welcome-app-route</text>
  <text x="390" y="445" fill="#60b8e0" font-size="11" text-decoration="underline">https://welcome-app.apps.cluster-prod-01.example.com</text>
  <text x="660" y="445" fill="#a0a0a0" font-size="11">welcome-app:8080</text>
  <rect x="788" y="432" width="38" height="16" rx="8" fill="#1a2a1a"/>
  <text x="807" y="444" fill="#5ec45e" font-size="9" text-anchor="middle">edge</text>
  <rect x="888" y="432" width="50" height="16" rx="8" fill="#0a1a0a"/>
  <text x="913" y="444" fill="#5ec45e" font-size="10" text-anchor="middle">Accepted</text>

  <!-- Route row 2 -->
  <rect x="240" y="460" width="740" height="38" fill="#141414"/>
  <text x="260" y="484" fill="#7090ff" font-size="12" font-weight="500">postgresql-internal</text>
  <text x="390" y="484" fill="#60b8e0" font-size="11" text-decoration="underline">https://postgresql.apps.cluster-prod-01.example.com</text>
  <text x="660" y="484" fill="#a0a0a0" font-size="11">postgresql:5432</text>
  <rect x="782" y="471" width="50" height="16" rx="8" fill="#1a1a2a"/>
  <text x="807" y="483" fill="#8080ff" font-size="9" text-anchor="middle">reencrypt</text>
  <rect x="888" y="471" width="50" height="16" rx="8" fill="#0a1a0a"/>
  <text x="913" y="483" fill="#5ec45e" font-size="10" text-anchor="middle">Accepted</text>

  <!-- Bottom pagination -->
  <rect x="240" y="500" width="740" height="20" fill="#0f0f0f"/>
  <text x="240" y="515" fill="#666" font-size="10">1 - 3 of 3 Services</text>
  <text x="760" y="515" fill="#666" font-size="10">1 - 2 of 2 Routes</text>
</svg>
