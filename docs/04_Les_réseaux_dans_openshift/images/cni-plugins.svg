<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="380" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">Plugins CNI supportés par OpenShift</text>
  <text x="410" y="46" text-anchor="middle" font-size="12" fill="#666">Le plugin réseau se configure à l'installation — OVN-Kubernetes est le défaut depuis OpenShift 4.12</text>

  <!-- OVN-Kubernetes (default, highlighted) -->
  <rect x="20" y="60" width="380" height="130" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <rect x="28" y="68" width="80" height="22" rx="4" fill="#ff0454"/>
  <text x="68" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PAR DÉFAUT</text>
  <text x="210" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="white">OVN-Kubernetes</text>
  <text x="210" y="130" text-anchor="middle" font-size="11" fill="#cdd6ff">Open Virtual Network — SDN natif Kubernetes</text>
  <rect x="35" y="140" width="170" height="36" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="120" y="156" text-anchor="middle" font-size="10" fill="white">NetworkPolicies</text>
  <text x="120" y="170" text-anchor="middle" font-size="10" fill="white">EgressIP / EgressFirewall</text>
  <rect x="220" y="140" width="165" height="36" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="302" y="156" text-anchor="middle" font-size="10" fill="white">Multicast</text>
  <text x="302" y="170" text-anchor="middle" font-size="10" fill="white">eBPF / OVS sous-jacent</text>

  <!-- Calico -->
  <rect x="420" y="60" width="185" height="130" rx="8" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="512" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#202cac">Calico</text>
  <text x="512" y="108" text-anchor="middle" font-size="10" fill="#555">Tigera / Project Calico</text>
  <rect x="435" y="118" width="155" height="28" rx="4" fill="#e8eaf6"/>
  <text x="512" y="136" text-anchor="middle" font-size="10" fill="#333">BGP routing natif</text>
  <rect x="435" y="152" width="155" height="28" rx="4" fill="#e8eaf6"/>
  <text x="512" y="170" text-anchor="middle" font-size="10" fill="#333">NetworkPolicies avancées</text>

  <!-- Cilium -->
  <rect x="620" y="60" width="185" height="130" rx="8" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="712" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#202cac">Cilium</text>
  <text x="712" y="108" text-anchor="middle" font-size="10" fill="#555">Isovalent / CNCF</text>
  <rect x="635" y="118" width="155" height="28" rx="4" fill="#e8eaf6"/>
  <text x="712" y="136" text-anchor="middle" font-size="10" fill="#333">eBPF-native (haute perf.)</text>
  <rect x="635" y="152" width="155" height="28" rx="4" fill="#e8eaf6"/>
  <text x="712" y="170" text-anchor="middle" font-size="10" fill="#333">Service mesh intégré</text>

  <!-- VMware NSX-T -->
  <rect x="20" y="210" width="240" height="120" rx="8" fill="white" stroke="#555" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">VMware NSX-T</text>
  <text x="140" y="256" text-anchor="middle" font-size="10" fill="#777">Environnements vSphere</text>
  <rect x="35" y="264" width="210" height="26" rx="4" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="140" y="281" text-anchor="middle" font-size="10" fill="#555">Intégration NSX native</text>
  <rect x="35" y="296" width="210" height="26" rx="4" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="140" y="313" text-anchor="middle" font-size="10" fill="#555">Micro-segmentation avancée</text>

  <!-- Cisco ACI -->
  <rect x="280" y="210" width="240" height="120" rx="8" fill="white" stroke="#555" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Cisco ACI</text>
  <text x="400" y="256" text-anchor="middle" font-size="10" fill="#777">Environnements Cisco ACI</text>
  <rect x="295" y="264" width="210" height="26" rx="4" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="400" y="281" text-anchor="middle" font-size="10" fill="#555">Politique réseau centralisée</text>
  <rect x="295" y="296" width="210" height="26" rx="4" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="400" y="313" text-anchor="middle" font-size="10" fill="#555">Intégration APIC</text>

  <!-- Kuryr (deprecated) -->
  <rect x="540" y="210" width="265" height="120" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="672" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">Kuryr (déprécié)</text>
  <text x="672" y="256" text-anchor="middle" font-size="10" fill="#aaa">OpenStack uniquement</text>
  <rect x="555" y="264" width="235" height="26" rx="4" fill="#f0f0f0"/>
  <text x="672" y="281" text-anchor="middle" font-size="10" fill="#aaa">Intégration Neutron OpenStack</text>
  <rect x="555" y="296" width="235" height="26" rx="4" fill="#fff0f3"/>
  <text x="672" y="313" text-anchor="middle" font-size="10" fill="#ff0454">Retiré dans OpenShift 4.15+</text>

  <!-- Bottom note -->
  <rect x="20" y="346" width="780" height="26" rx="4" fill="#e8eaf6" stroke="#202cac" stroke-width="1"/>
  <text x="410" y="362" text-anchor="middle" font-size="11" fill="#202cac" font-weight="bold">Le plugin CNI se choisit à l'installation dans install-config.yaml — il ne peut pas être changé après coup sans réinstallation</text>
</svg>
