  <text x="870" y="137" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Last 1 hour</text>

  <!-- Metric Cards Row -->
  <!-- CPU Card -->
  <rect x="236" y="164" width="228" height="90" rx="6" class="card-bg" stroke="#2e2e50" stroke-width="1"/>
  <text x="252" y="186" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">CPU Usage</text>
  <text x="252" y="222" fill="#4caf50" font-size="28" font-weight="bold" font-family="Arial, sans-serif">0.45</text>
  <text x="320" y="222" fill="#4caf50" font-size="14" font-family="Arial, sans-serif">cores</text>
  <text x="252" y="244" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Requested: 0.6 cores</text>
  <!-- small sparkline -->
  <polyline points="352,238 362,232 372,235 382,228 392,222 402,226 412,220 422,224 432,218 442,222 452,215" fill="none" stroke="#4caf50" stroke-width="1.5" opacity="0.7"/>

  <!-- Memory Card -->
  <rect x="478" y="164" width="228" height="90" rx="6" class="card-bg" stroke="#2e2e50" stroke-width="1"/>
  <text x="494" y="186" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Memory Usage</text>
  <text x="494" y="222" fill="#4caf50" font-size="28" font-weight="bold" font-family="Arial, sans-serif">512</text>
  <text x="548" y="222" fill="#4caf50" font-size="14" font-family="Arial, sans-serif">Mi</text>
  <text x="494" y="244" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Requested: 768Mi</text>
  <!-- small sparkline memory -->
  <polyline points="594,240 604,238 614,235 624,232 634,236 644,230 654,228 664,232 674,226 684,228 694,224" fill="none" stroke="#4caf50" stroke-width="1.5" opacity="0.7"/>

  <!-- Pod Count Card -->
  <rect x="720" y="164" width="264" height="90" rx="6" class="card-bg" stroke="#2e2e50" stroke-width="1"/>
  <text x="736" y="186" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Pod Count</text>
  <text x="736" y="222" fill="#4caf50" font-size="28" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="764" y="222" fill="#4caf50" font-size="14" font-family="Arial, sans-serif">running</text>
  <text x="736" y="244" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">0 pending  |  0 failed</text>
  <!-- Pod status dots -->
  <circle cx="896" cy="210" r="8" fill="#4caf50" opacity="0.8"/>
  <circle cx="916" cy="210" r="8" fill="#4caf50" opacity="0.8"/>
  <circle cx="936" cy="210" r="8" fill="#4caf50" opacity="0.8"/>

  <!-- CPU Usage Chart -->
  <rect x="236" y="268" width="748" height="180" rx="6" class="card-bg" stroke="#2e2e50" stroke-width="1"/>
  <text x="252" y="291" fill="#e8e8f0" font-size="13" font-weight="bold" font-family="Arial, sans-serif">CPU Usage — Last Hour</text>

  <!-- Time range label -->
  <text x="870" y="291" fill="#9090b0" font-size="10" font-family="Arial, sans-serif">1h ago → now</text>

  <!-- Chart area background -->
  <rect x="252" y="300" width="716" height="130" rx="3" fill="#1a1a30"/>

  <!-- Grid lines -->
  <line x1="252" y1="330" x2="968" y2="330" stroke="#2a2a4a" stroke-width="0.5"/>
  <line x1="252" y1="360" x2="968" y2="360" stroke="#2a2a4a" stroke-width="0.5"/>
  <line x1="252" y1="390" x2="968" y2="390" stroke="#2a2a4a" stroke-width="0.5"/>
  <line x1="252" y1="420" x2="968" y2="420" stroke="#2a2a4a" stroke-width="0.5"/>

  <!-- Y axis labels -->
  <text x="234" y="334" fill="#9090b0" font-size="9" text-anchor="end" font-family="Arial, sans-serif">0.6</text>
  <text x="234" y="364" fill="#9090b0" font-size="9" text-anchor="end" font-family="Arial, sans-serif">0.4</text>
  <text x="234" y="394" fill="#9090b0" font-size="9" text-anchor="end" font-family="Arial, sans-serif">0.2</text>
  <text x="234" y="424" fill="#9090b0" font-size="9" text-anchor="end" font-family="Arial, sans-serif">0</text>

  <!-- X axis time labels -->
  <text x="252" y="440" fill="#9090b0" font-size="9" font-family="Arial, sans-serif">12:00</text>
  <text x="372" y="440" fill="#9090b0" font-size="9" font-family="Arial, sans-serif">12:10</text>
  <text x="492" y="440" fill="#9090b0" font-size="9" font-family="Arial, sans-serif">12:20</text>
  <text x="612" y="440" fill="#9090b0" font-size="9" font-family="Arial, sans-serif">12:40</text>
  <text x="732" y="440" fill="#9090b0" font-size="9" font-family="Arial, sans-serif">12:50</text>
  <text x="900" y="440" fill="#9090b0" font-size="9" font-family="Arial, sans-serif">13:00</text>

  <!-- CPU line chart — stylized green line -->
  <path d="M252,418 C270,415 285,400 305,395 C325,390 340,385 360,375 C380,365 395,370 415,360 C435,350 450,345 470,340 C490,335 505,348 525,342 C545,336 560,325 580,320 C600,315 615,330 635,322 C655,314 670,308 690,310 C710,312 725,305 745,300 C765,295 780,310 800,308 C820,306 835,295 855,292 C875,289 890,300 910,296 C930,292 945,285 968,282"
        fill="none" stroke="#4caf50" stroke-width="2.5"/>

  <!-- Area under line -->
  <path d="M252,418 C270,415 285,400 305,395 C325,390 340,385 360,375 C380,365 395,370 415,360 C435,350 450,345 470,340 C490,335 505,348 525,342 C545,336 560,325 580,320 C600,315 615,330 635,322 C655,314 670,308 690,310 C710,312 725,305 745,300 C765,295 780,310 800,308 C820,306 835,295 855,292 C875,289 890,300 910,296 C930,292 945,285 968,282 L968,430 L252,430 Z"
        fill="url(#cpuGrad)"/>

  <!-- Current value tooltip -->
  <line x1="968" y1="282" x2="968" y2="430" stroke="#4caf50" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="968" cy="282" r="4" fill="#4caf50"/>
  <rect x="930" y="265" width="52" height="18" rx="3" fill="#2a4a2a"/>
  <text x="936" y="278" fill="#4caf50" font-size="10" font-family="Arial, sans-serif">0.45 c</text>

  <!-- Footer -->
  <rect x="220" y="490" width="780" height="30" fill="#141428"/>
  <line x1="220" y1="490" x2="1000" y2="490" stroke="#2a2a4a" stroke-width="1"/>
  <text x="236" y="509" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">OpenShift Container Platform 4.14  |  Monitoring stack: Prometheus + Alertmanager + Thanos</text>
</svg>
