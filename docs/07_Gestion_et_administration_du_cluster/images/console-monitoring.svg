<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .nav-bg { fill: #0d0d1a; }
      .sidebar-bg { fill: #141428; }
      .main-bg { fill: #1c1c30; }
      .card-bg { fill: #222240; }
      .table-header { fill: #252540; }
      .text-white { fill: #e8e8f0; font-family: Arial, sans-serif; }
      .text-gray { fill: #9090b0; font-family: Arial, sans-serif; }
      .text-green { fill: #4caf50; font-family: Arial, sans-serif; }
      .divider { stroke: #2a2a4a; stroke-width: 1; }
      .chart-line { fill: none; stroke: #4caf50; stroke-width: 2; }
      .chart-area { fill: rgba(76,175,80,0.12); }
      .chart-grid { stroke: #2a2a4a; stroke-width: 1; }
    </style>
    <linearGradient id="cpuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4caf50" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2196f3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2196f3" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" class="bg"/>

  <!-- Top Navigation Bar -->
  <rect width="1000" height="48" class="nav-bg"/>
  <line x1="0" y1="48" x2="1000" y2="48" class="divider"/>

  <!-- Logo area -->
  <rect x="0" y="0" width="220" height="48" fill="#0a0a18"/>
  <rect x="12" y="14" width="20" height="20" rx="10" fill="#ff0454"/>
  <text x="40" y="28" fill="#ff0454" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Red Hat</text>
  <text x="108" y="28" fill="#e8e8f0" font-size="13" font-family="Arial, sans-serif"> OpenShift</text>

  <!-- Nav items -->
  <text x="240" y="28" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Home</text>
  <text x="290" y="28" fill="#e8e8f0" font-size="12" font-family="Arial, sans-serif">Administrator</text>

  <!-- Right nav -->
  <circle cx="950" cy="24" r="10" fill="#ff0454" opacity="0.85"/>
  <text x="946" y="29" fill="white" font-size="11" font-weight="bold" font-family="Arial, sans-serif">A</text>
  <text x="968" y="28" fill="#e8e8f0" font-size="12" font-family="Arial, sans-serif">admin</text>

  <!-- Sidebar -->
  <rect x="0" y="48" width="220" height="472" class="sidebar-bg"/>
  <line x1="220" y1="48" x2="220" y2="520" class="divider"/>

  <!-- Sidebar items -->
  <text x="20" y="80" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Home</text>
  <line x1="0" y1="92" x2="220" y2="92" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="114" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Operators</text>
  <line x1="0" y1="126" x2="220" y2="126" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="148" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Workloads</text>
  <line x1="0" y1="160" x2="220" y2="160" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="182" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Networking</text>
  <line x1="0" y1="194" x2="220" y2="194" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="216" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Compute</text>
  <line x1="0" y1="228" x2="220" y2="228" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Observe - HIGHLIGHTED SECTION -->
  <rect x="0" y="228" width="220" height="26" fill="#1a2060"/>
  <text x="14" y="246" fill="#aac0ff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Observe</text>
  <line x1="0" y1="254" x2="220" y2="254" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Observe sub-items -->
  <!-- Dashboards - active -->
  <rect x="0" y="254" width="220" height="30" fill="#202cac"/>
  <rect x="0" y="254" width="4" height="30" fill="#ff0454"/>
  <text x="22" y="274" fill="white" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Dashboards</text>

  <!-- Metrics -->
  <rect x="0" y="284" width="220" height="28" fill="#1e1e3a"/>
  <text x="22" y="302" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Metrics</text>

  <!-- Alerts -->
  <rect x="0" y="312" width="220" height="28" fill="#1e1e3a"/>
  <text x="22" y="330" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Alerts</text>
  <!-- Alert badge -->
  <rect x="168" y="316" width="36" height="18" rx="9" fill="#3a1020"/>
  <text x="176" y="329" fill="#ff6080" font-size="10" font-weight="bold" font-family="Arial, sans-serif">2</text>

  <!-- Targets -->
  <rect x="0" y="340" width="220" height="28" fill="#1e1e3a"/>
  <text x="22" y="358" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Targets</text>

  <line x1="0" y1="368" x2="220" y2="368" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="390" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">User Management</text>
  <line x1="0" y1="402" x2="220" y2="402" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Main content area -->
  <rect x="220" y="48" width="780" height="472" class="main-bg"/>

  <!-- Breadcrumb -->
  <text x="236" y="76" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">Observe</text>
  <text x="286" y="76" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">></text>
  <text x="298" y="76" fill="#aac0ff" font-size="12" font-family="Arial, sans-serif">Dashboards</text>

  <!-- Page Title -->
  <text x="236" y="106" fill="white" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Dashboards</text>

  <!-- Dashboard selector -->
  <rect x="236" y="118" width="360" height="30" rx="4" fill="#252540" stroke="#3a3a5a" stroke-width="1"/>
  <text x="250" y="137" fill="#aac0ff" font-size="12" font-family="Arial, sans-serif">Kubernetes / Compute Resources / Namespace</text>
  <text x="580" y="137" fill="#9090b0" font-size="12" font-family="Arial, sans-serif">v</text>

  <!-- Namespace selector -->
  <text x="618" y="136" fill="#9090b0" font-size="11" font-family="Arial, sans-serif">Namespace:</text>
