<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#202cac"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#202cac">Processus de mise à jour OpenShift</text>
  <text x="410" y="46" text-anchor="middle" font-size="12" fill="#666">Orchestré par le Cluster Version Operator (CVO) — rolling update sans interruption de service</text>

  <!-- Step 1 -->
  <rect x="20" y="65" width="150" height="80" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="95" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="white">① Initiation</text>
  <text x="95" y="112" text-anchor="middle" font-size="10" fill="#cdd6ff">oc adm upgrade</text>
  <text x="95" y="127" text-anchor="middle" font-size="10" fill="#cdd6ff">--to=4.x.y</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="105" x2="200" y2="105" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="200" y="65" width="150" height="80" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="275" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">② CVO</text>
  <text x="275" y="104" text-anchor="middle" font-size="10" fill="#cdd6ff">Télécharge</text>
  <text x="275" y="118" text-anchor="middle" font-size="10" fill="#cdd6ff">la release image</text>
  <text x="275" y="132" text-anchor="middle" font-size="10" fill="#cdd6ff">depuis le registry</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="105" x2="380" y2="105" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="380" y="65" width="150" height="80" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="455" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">③ Operators</text>
  <text x="455" y="104" text-anchor="middle" font-size="10" fill="#cdd6ff">Mise à jour des</text>
  <text x="455" y="118" text-anchor="middle" font-size="10" fill="#cdd6ff">cluster operators</text>
  <text x="455" y="132" text-anchor="middle" font-size="10" fill="#cdd6ff">dans l'ordre</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="105" x2="560" y2="105" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="560" y="65" width="150" height="80" rx="8" fill="#202cac" filter="url(#shadow)"/>
  <text x="635" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">④ Control Plane</text>
  <text x="635" y="104" text-anchor="middle" font-size="10" fill="#cdd6ff">MAJ masters</text>
  <text x="635" y="118" text-anchor="middle" font-size="10" fill="#cdd6ff">Un par un</text>
  <text x="635" y="132" text-anchor="middle" font-size="10" fill="#cdd6ff">(drain + reboot)</text>

  <!-- Arrow 4 down -->
  <line x1="635" y1="145" x2="635" y2="170" stroke="#202cac" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Workers -->
  <rect x="420" y="170" width="430" height="80" rx="8" fill="#e8eaf6" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="635" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">⑤ Workers — MachineConfig rolling update</text>
  <!-- Worker nodes in sequence -->
  <rect x="435" y="207" width="90" height="30" rx="4" fill="#202cac"/>
  <text x="480" y="226" text-anchor="middle" font-size="10" fill="white">worker-0 ✓</text>
  <rect x="540" y="207" width="90" height="30" rx="4" fill="#202cac" opacity="0.7"/>
  <text x="585" y="226" text-anchor="middle" font-size="10" fill="white">worker-1 ↻</text>
  <rect x="645" y="207" width="90" height="30" rx="4" fill="#888"/>
  <text x="690" y="226" text-anchor="middle" font-size="10" fill="white">worker-2 ⏳</text>
  <rect x="750" y="207" width="85" height="30" rx="4" fill="#888" opacity="0.5"/>
  <text x="792" y="226" text-anchor="middle" font-size="10" fill="white">worker-N…</text>

  <!-- Back arrow down to finalization -->
  <line x1="425" y1="210" x2="310" y2="210" stroke="#202cac" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="20" y="170" width="280" height="80" rx="8" fill="#e8eaf6" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">⑥ Finalisation</text>
  <text x="160" y="210" text-anchor="middle" font-size="10" fill="#555">Vérification de tous les cluster operators</text>
  <text x="160" y="225" text-anchor="middle" font-size="10" fill="#555">Status: Available=True, Progressing=False</text>
  <text x="160" y="240" text-anchor="middle" font-size="10" fill="#555">clusterversion: Completed</text>

  <!-- Version channels -->
  <rect x="20" y="268" width="780" height="100" rx="8" fill="white" stroke="#202cac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#202cac">Canaux de mise à jour (Update Channels)</text>
  <rect x="35" y="296" width="220" height="56" rx="6" fill="#e8eaf6"/>
  <text x="145" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#202cac">stable-4.x</text>
  <text x="145" y="332" text-anchor="middle" font-size="10" fill="#555">Recommandé production</text>
  <text x="145" y="346" text-anchor="middle" font-size="10" fill="#555">Versions validées Red Hat</text>
  <rect x="270" y="296" width="220" height="56" rx="6" fill="#fff8e8" stroke="#f0ab00" stroke-width="1"/>
  <text x="380" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">fast-4.x</text>
  <text x="380" y="332" text-anchor="middle" font-size="10" fill="#555">Versions récentes mais moins testées</text>
  <text x="380" y="346" text-anchor="middle" font-size="10" fill="#555">Accepte plus de risques</text>
  <rect x="505" y="296" width="280" height="56" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="645" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">candidate-4.x / eus-4.x</text>
  <text x="645" y="332" text-anchor="middle" font-size="10" fill="#777">Versions RC / Long Term Support</text>
  <text x="645" y="346" text-anchor="middle" font-size="10" fill="#777">Cas d'usage spécifiques</text>

  <!-- Note -->
  <rect x="20" y="382" width="780" height="26" rx="4" fill="#fff0f3" stroke="#ff0454" stroke-width="1"/>
  <text x="410" y="399" text-anchor="middle" font-size="11" fill="#ff0454" font-weight="bold">Les mises à jour Z (4.x.Y) sont obligatoires avant les mises à jour mineures (4.X) — chemin de mise à jour validé par Red Hat</text>
</svg>
